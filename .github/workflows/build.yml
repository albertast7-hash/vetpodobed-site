name: Build & deploy vitrine

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов — подхватывает новые статьи из БД
  workflow_dispatch:        # ручной запуск из вкладки Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog + sitemap from Supabase
        env:
          # anon-ключ публичен по дизайну; можно переопределить repo variable SUPABASE_ANON_KEY
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://supa.vetpodobed.pro' }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ vars.SITE_URL || 'https://info.vetpodobed.pro' }}
        run: node scripts/generate.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deploy
        uses: actions/deploy-pages@v4
